[build]
builder = "NIXPACKS"

[deploy]
startCommand = "python3 -m waitress --host=0.0.0.0 --port=$PORT app_production:app"
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[nixpacks]
phases.build.nixPkgs = ["python311"]
phases.build.cmds = ["pip3 install -r requirements.txt"]
phases.start.cmd = "python3 -m waitress --host=0.0.0.0 --port=$PORT app_production:app"
